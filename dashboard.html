<!DOCTYPE html>
<html>
<head>
  <title>NDK SEO Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; padding: 30px; background: #f5f7f8;">

<h1>NDK SEO Dashboard</h1>

<button onclick="loadData()">Load SEO Data</button>

<canvas id="chart"></canvas>

<script>
async function loadData() {
  const res = await fetch('/data');
  const data = await res.json();

  const keywords = data.rows.map(r => r.keys[0]);
  const positions = data.rows.map(r => r.position);

  new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: {
      labels: keywords,
      datasets: [{
        label: 'Position',
        data: positions
      }]
    },
    options: {
      scales: {
        y: { reverse: true }
      }
    }
  });
}
</script>

</body>
</html>
